    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혁솔 금융정보 매칭 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f8; color: #333; }
        .header { background-color: #1a365d; color: #ffffff; padding: 30px 0; text-align: center; cursor: pointer; }
        .header h1 { font-size: 28px; font-weight: 700; }
        .main-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .sub-title { font-size: 18px; color: #4a5568; margin-bottom: 20px; font-weight: 500; border-left: 4px solid #3182ce; padding-left: 10px; }
        .post-list { display: flex; flex-direction: column; gap: 16px; }
        .post-card { background: white; padding: 24px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.05); border-color: #3182ce; }
        .post-title { font-size: 18px; font-weight: 700; color: #2d3748; margin-bottom: 8px; }
        .post-meta { font-size: 14px; color: #718096; }
        .loading-message { text-align: center; padding: 40px; color: #a0aec0; font-size: 16px; }
        /* 글 상세보기 스타일 */
        .post-view { display: none; background: white; padding: 40px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .back-btn { display: inline-block; background: #3182ce; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-weight: 500; margin-bottom: 30px; cursor: pointer; }
        .post-view h1 { margin-bottom: 20px; color: #1a365d; font-size: 26px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .post-view h2 { margin: 30px 0 15px 0; color: #2c5282; font-size: 20px; }
        .post-view p { margin-bottom: 12px; line-height: 1.7; }
        .post-view ul { margin-left: 20px; margin-bottom: 20px; line-height: 1.7; }
        .post-view hr { margin: 30px 0; border: 0; border-top: 1px solid #e2e8f0; }
        .post-view blockquote { border-left: 4px solid #3182ce; background: #ebf8ff; padding: 15px; margin: 20px 0; border-radius: 4px; font-style: italic; }
    </style>
</head>
<body>

    <header class="header" onclick="goHome()">
        <h1>혁솔 금융정보 매칭 가이드</h1>
    </header>

    <main class="main-container">
        <div id="list-section">
            <h2 class="sub-title">최신 금융 상품 분석 포스팅</h2>
            <div id="posts-container" class="post-list">
                <div class="loading-message">로봇이 작성한 최신 포스팅을 불러오는 중입니다...</div>
            </div>
        </div>

        <div id="view-section" class="post-view">
            <div class="back-btn" onclick="goHome()">← 목록으로 돌아가기</div>
            <div id="post-content"></div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "yooondohyun-dev";
        const GITHUB_REPO = "my-financial-blog";

        // 메인 홈으로 이동 (목록 켜고 본문 숨기기)
        function goHome() {
            document.getElementById('list-section').style.display = 'block';
            document.getElementById('view-section').style.display = 'none';
            window.scrollTo(0, 0);
        }

        // 특정 글을 클릭했을 때 내 사이트 내부에서 마크다운을 렌더링해 보여주는 함수
        async function viewPost(downloadUrl) {
            try {
                const response = await fetch(downloadUrl);
                let text = await response.text();
                
                // 마크다운 상단의 머리말(--- 영역)을 제거하여 깔끔하게 본문만 추출
                if (text.startsWith('---')) {
                    const parts = text.split('---');
                    if (parts.length >= 3) {
                        text = parts.slice(2).join('---');
                    }
                }

                // 라이브러리를 통해 마크다운을 예쁜 HTML로 변환
                document.getElementById('post-content').innerHTML = marked.parse(text);
                
                // 화면 전환
                document.getElementById('list-section').style.display = 'none';
                document.getElementById('view-section').style.display = 'block';
                window.scrollTo(0, 0);
            } catch (error) {
                alert('글을 불러오지 못했습니다.');
            }
        }

        async function loadBlogPosts() {
            const container = document.getElementById('posts-container');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/content/posts`);
                if (!response.ok) {
                    container.innerHTML = '<div class="loading-message">발행된 포스팅이 없습니다.</div>';
                    return;
                }

                const files = await response.json();
                files.reverse(); // 최신글이 위로 오게 정렬

                container.innerHTML = '';

                // 각 글 파일의 알맹이를 고속으로 임시 조회하여 진짜 '한글 제목'을 추출합니다.
                for (const file of files) {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    
                    // 파일 내부 정보 비동기 호출
                    const fileMetaResponse = await fetch(file.download_url);
                    const fileText = await fileMetaResponse.text();
                    
                    // 마크다운 내부의 title: "..." 문구를 찾아 진짜 제목 매칭
                    const titleMatch = fileText.match(/title:\s*"(.*?)"/);
                    const realTitle = titleMatch ? titleMatch[1] : file.name.replace('.md', '');

                    card.onclick = () => viewPost(file.download_url);
                    card.innerHTML = `
                        <div class="post-title">${realTitle}</div>
                        <div class="post-meta">📊 금융감독원 공시 기반 실시간 분석 완료</div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                container.innerHTML = '<div class="loading-message">포스팅 목록을 불러오는 중 에러가 발생했습니다.</div>';
            }
        }

        loadBlogPosts();
    </script>
</body>
</html>
